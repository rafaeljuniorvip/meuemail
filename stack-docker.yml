version: "3.8"

services:
  meuemail:
    image: ghcr.io/rafaeljuniorvip/meuemail:latest
    networks:
      - minha_rede
      - default
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - IMAP_ENCRYPTION_KEY=${IMAP_ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - APP_URL=${APP_URL}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.meuemail.rule=Host(`meuemail.falavip.com.br`)"
        - "traefik.http.routers.meuemail.entrypoints=websecure"
        - "traefik.http.routers.meuemail.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.meuemail.loadbalancer.server.port=8467"
        - "traefik.docker.network=minha_rede"

  meuemail-db:
    image: postgres:16-alpine
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - meuemail-pgdata:/var/lib/postgresql/data

volumes:
  meuemail-pgdata:

networks:
  minha_rede:
    external: true
