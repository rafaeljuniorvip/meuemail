<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuEmail - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: oklch(97% 0.01 250);
            --surface: oklch(99% 0.004 250);
            --border: oklch(90% 0.012 250);
            --text: oklch(28% 0.02 262);
            --text-secondary: oklch(45% 0.015 255);
            --text-muted: oklch(60% 0.014 255);
            --primary: oklch(53% 0.18 257);
            --primary-hover: oklch(48% 0.17 257);
            --danger: oklch(58% 0.21 25);
            --font: 'Manrope', 'Segoe UI', sans-serif;
            --font-display: 'Syne', 'Manrope', sans-serif;
            --shadow-card: 0 18px 48px rgba(15, 23, 42, 0.12);
        }
        body {
            font-family: var(--font);
            background:
                radial-gradient(1200px 500px at -10% -20%, oklch(90% 0.07 250 / 0.6), transparent 60%),
                radial-gradient(900px 420px at 110% 0%, oklch(92% 0.06 165 / 0.45), transparent 60%),
                linear-gradient(180deg, oklch(96% 0.01 250) 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow-card);
            padding: 48px 40px;
            text-align: center;
        }
        .login-logo {
            font-family: var(--font-display);
            font-size: 34px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: -0.03em;
        }
        .login-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 0.11em;
        }
        .login-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: oklch(93% 0.05 253);
            border: 1px solid oklch(88% 0.035 253);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-icon svg {
            width: 32px;
            height: 32px;
            color: var(--primary);
        }
        .btn-google {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-family: var(--font);
        }
        .btn-google:hover {
            background: oklch(97% 0.008 250);
            border-color: oklch(85% 0.02 250);
            box-shadow: 0 10px 24px rgba(49, 46, 129, 0.12);
            transform: translateY(-1px);
        }
        .btn-google svg {
            width: 20px;
            height: 20px;
        }
        .login-error {
            background: oklch(95% 0.035 25);
            color: var(--danger);
            padding: 12px 16px;
            border: 1px solid oklch(88% 0.05 25);
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .login-footer {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">MeuEmail</div>
            <div class="login-subtitle">Gestao de Emails</div>

            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
            </div>

            <div id="error-msg" class="login-error" style="display:none;"></div>

            <a href="/auth/login" class="btn-google">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Entrar com Google
            </a>

            <div class="login-footer">
                Apenas usuarios autorizados podem acessar o sistema.
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error) {
            const msg = document.getElementById('error-msg');
            const messages = {
                'not_allowed': 'Acesso nao permitido. Seu email nao esta cadastrado no sistema.',
                'inactive': 'Sua conta esta desativada. Entre em contato com o administrador.',
                'google_failed': 'Falha na autenticacao com o Google. Tente novamente.',
                'no_code': 'Erro no fluxo de autenticacao. Tente novamente.',
                'no_email': 'Nao foi possivel obter o email da conta Google.',
            };
            msg.textContent = messages[error] || 'Erro desconhecido. Tente novamente.';
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
